<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Convertly</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #18181b; --card-bg: #27272a; --dropdown-bg: #202022; --text: #f3f4f6; --text-muted: #9ca3af; --border: #3f3f46; --accent: #3b82f6; --hover: #3f3f46; --input-bg: #202022; --tab-active: rgba(59, 130, 246, 0.15); --checkbox-bg: #3f3f46; }
    [data-theme="light"] { --bg: #ffffff; --card-bg: #f3f4f6; --dropdown-bg: #ffffff; --text: #1f2937; --text-muted: #6b7280; --border: #e5e7eb; --hover: #e5e7eb; --input-bg: #ffffff; --checkbox-bg: #d1d5db; }
    
    body { width: 360px; margin: 0; font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; transition: background 0.3s; }
    body.rtl { direction: rtl; }
    body.rtl #btn-close-settings svg, body.rtl #btn-back-multi svg { transform: scaleX(-1); }

    @keyframes pop-success { 0% { transform: scale(1); } 50% { transform: scale(1.1); color: var(--accent); } 100% { transform: scale(1); } }
    .pop-effect { animation: pop-success 0.3s ease-in-out; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; margin: 5px 0; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    .header-main { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid var(--border); }
    .brand-title { font-weight: 700; font-size: 18px; color: #fbbf24; }
    
    .nav-tabs { display: flex; background: var(--card-bg); border-radius: 12px; padding: 3px; border: 1px solid var(--border); }
    .nav-item { background: transparent; border: none; cursor: pointer; padding: 6px 14px; border-radius: 8px; color: var(--text-muted); transition: 0.2s; display: flex; align-items: center; }
    .nav-item.active { background: var(--border); color: var(--text); }
    .nav-item:hover:not(.active) { color: var(--text); }
    .nav-item svg { width: 18px; height: 18px; }

    .header-actions { display: flex; gap: 8px; align-items: center; }
    .icon-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 8px; border-radius: 8px; transition: 0.2s; display: flex; }
    .icon-btn:hover { background: var(--hover); color: var(--text); }

    .view { display: none; padding: 20px; animation: fadeIn 0.2s; }
    .view.active { display: block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

    .converter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; position: relative; z-index: 100; }
    .custom-select-container { flex: 1; position: relative; }
    .select-trigger { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; height: 48px; box-sizing: border-box; }
    .select-trigger:hover { border-color: var(--text-muted); }
    .trigger-flag { width: 28px; height: 20px; border-radius: 4px; object-fit: cover; border: 1px solid var(--border); background:#fff; }
    .trigger-code { font-weight: 700; font-size: 15px; flex: 1; }
    .dropdown-menu { position: absolute; top: 110%; left: 0; width: 280px; background: var(--dropdown-bg); border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); padding: 10px; display: none; z-index: 999; text-align: left;}
    .dropdown-menu.active { display: block; }
    .custom-select-container:last-child .dropdown-menu { left: auto; right: 0; }
    body.rtl .dropdown-menu { text-align: right; left: auto; right: 0; }
    body.rtl .custom-select-container:last-child .dropdown-menu { right: auto; left: 0; }
    .search-box { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; outline: none; margin-bottom: 8px; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
    .options-list { max-height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; padding-right: 5px; }
    .option-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 6px; cursor: pointer; }
    .option-item:hover { background: var(--hover); }
    .option-flag { width: 26px; height: 18px; border-radius: 3px; object-fit: cover; border: 1px solid var(--border); background:#fff; }

    .input-wrapper { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 20px; }
    .lbl { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 5px; font-weight: 600; }
    #amount { width: 100%; background: transparent; border: none; font-size: 28px; font-weight: 700; color: var(--text); outline: none; font-family: inherit;}
    .result-text { text-align: center; color: var(--accent); font-size: 24px; font-weight: 700; margin-bottom: 40px; min-height: 35px;}

    .footer-bar { display: flex; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 1px solid var(--border); }
    .branding-link { text-decoration: none; display: flex; align-items: center; gap: 3px; color: #FFDD00; font-weight: 700; font-size: 13px; transition: 0.2s; background: rgba(255, 221, 0, 0.1); padding: 5px 10px; border-radius: 12px; border: 1px solid rgba(255, 221, 0, 0.2); }
    .branding-link:hover { background: rgba(255, 221, 0, 0.2); transform: scale(1.02); }
    .branding-link img { width: 35px; height: auto; object-fit: contain; }

    .copyright-area { text-align: center; font-size: 10px; color: var(--text-muted); margin-top: 15px; border-top: 1px solid var(--border); padding-top: 10px;}

    .header-settings { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .settings-title { font-weight: 700; font-size: 18px; }
    .s-input, .s-select { width: 100%; padding: 12px; background-color: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; outline: none; box-sizing: border-box; font-family: inherit; }
    .s-select { cursor: pointer; appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%239ca3af%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 12px center; background-size: 10px; padding-right: 30px; }
    body.rtl .s-select { background-position: left 12px center; padding-right: 12px; padding-left: 30px; }
    .settings-section { margin-bottom: 20px; }
    .sec-label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; }
    .sub-text { font-size: 10px; color: var(--text-muted); margin-top: 4px; }
    .theme-row { display: flex; gap: 12px; }
    .theme-card { flex: 1; border: 2px solid var(--border); border-radius: 12px; padding: 15px; cursor: pointer; position: relative; overflow: hidden; height: 60px; }
    .theme-card.active { border-color: var(--accent); }
    .theme-preview { font-weight: 700; font-size: 16px; margin-bottom: 25px; }
    .theme-icon { position: absolute; bottom: 10px; right: 10px; }
    .checklist-container { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; padding-right: 8px; }
    body.rtl .checklist-container { padding-right: 0; padding-left: 8px; }
    .check-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--card-bg); border-radius: 10px; border: 1px solid var(--border); cursor: pointer; transition: 0.1s; }
    .check-item:hover { border-color: var(--text-muted); }
    .check-info { display: flex; align-items: center; gap: 12px; font-size: 13px; }
    .check-info img { width: 28px; height: 20px; border-radius: 4px; object-fit: cover; flex-shrink: 0; background-color: #ffffff; border: 1px solid var(--border); }
    .custom-checkbox { width: 20px; height: 20px; background: var(--checkbox-bg); border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0; }
    input[type="checkbox"]:checked + .custom-checkbox { background: var(--accent); }
    .custom-checkbox svg { width: 12px; height: 12px; stroke: #fff; stroke-width: 3; fill: none; opacity: 0; transition: 0.2s; }
    input[type="checkbox"]:checked + .custom-checkbox svg { opacity: 1; }
    .check-item input[type="checkbox"] { display: none; }
    .share-row { display: flex; gap: 20px; margin-top: 10px; }
    .share-icon { width: 22px; height: 22px; fill: var(--text-muted); cursor: pointer; transition: 0.2s; }
    .share-icon:hover { fill: var(--text); }
  </style>
</head>
<body data-theme="dark">

  <div class="header-main">
    <div class="brand-title">Convertly</div>
    <div class="nav-tabs">
        <button class="nav-item active" id="tab-calc" title="Calculator"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg></button>

            </svg>
        </button>
    </div>
  </div>

  <div id="view-calc" class="view active">
    <div class="converter-row">
      <div class="custom-select-container" id="from-container">

    <div class="result-text" id="resultText">...</div>
